<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    width:95%;
    max-width:400px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.toggle-btn{
    background:#6c757d;
}

.logout-btn{
    background:#dc3545;
}

.logout-btn:hover{
    background:#b02a37;
}

label{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
}

#message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

.hidden{
    display:none;
}

.welcome{
    text-align:center;
    margin:20px 0;
    font-size:20px;
    color:#28a745;
}
</style>
</head>
<body>

<div class="container">

    <!-- Registration -->
    <div id="registerSection">
        <h2>Create Account</h2>

        <input type="text" id="regUser" placeholder="Username">

        <input type="password" id="regPass" placeholder="Password">

        <input type="password" id="regConfirm" placeholder="Confirm Password">

        <button class="toggle-btn" onclick="togglePassword('regPass','regConfirm')">
            Show / Hide Password
        </button>

        <button onclick="registerUser()">Register</button>

        <hr style="margin:20px 0;">
    </div>

    <!-- Login -->
    <div id="loginSection">
        <h2>Login</h2>

        <input type="text" id="loginUser" placeholder="Username">

        <input type="password" id="loginPass" placeholder="Password">

        <button class="toggle-btn" onclick="togglePassword('loginPass')">
            Show / Hide Password
        </button>

        <label>
            <input type="checkbox" id="rememberMe" style="width:auto;">
            Remember Me
        </label>

        <button onclick="loginUser()">Login</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
        <h2>Dashboard</h2>

        <div class="welcome" id="welcomeText"></div>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>
    </div>

    <p id="message"></p>

</div>

<script>

// SHA-256 Hash Function
async function hashPassword(password){
    const msgBuffer = new TextEncoder().encode(password);

    const hashBuffer = await crypto.subtle.digest(
        "SHA-256",
        msgBuffer
    );

    const hashArray = Array.from(
        new Uint8Array(hashBuffer)
    );

    return hashArray
        .map(b => b.toString(16).padStart(2,"0"))
        .join("");
}

// Toggle Password Visibility
function togglePassword(...ids){

    ids.forEach(id=>{
        let field = document.getElementById(id);

        if(field.type === "password"){
            field.type = "text";
        }else{
            field.type = "password";
        }
    });
}

// Register User
async function registerUser(){

    let username =
        document.getElementById("regUser").value.trim();

    let password =
        document.getElementById("regPass").value;

    let confirm =
        document.getElementById("regConfirm").value;

    let message =
        document.getElementById("message");

    if(username === ""){
        return showMsg("Enter username","red");
    }

    if(password.length < 6){
        return showMsg(
            "Password must be at least 6 characters",
            "red"
        );
    }

    if(password !== confirm){
        return showMsg(
            "Passwords do not match",
            "red"
        );
    }

    let users =
        JSON.parse(localStorage.getItem("users"))
        || [];

    if(users.find(u => u.username === username)){
        return showMsg(
            "Username already exists",
            "red"
        );
    }

    const hashed =
        await hashPassword(password);

    users.push({
        username: username,
        password: hashed
    });

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    );

    showMsg(
        "Account created successfully!",
        "green"
    );
}

// Login User
async function loginUser(){

    let username =
        document.getElementById("loginUser").value.trim();

    let password =
        document.getElementById("loginPass").value;

    let users =
        JSON.parse(localStorage.getItem("users"))
        || [];

    let hashed =
        await hashPassword(password);

    let user =
        users.find(
            u => u.username === username &&
            u.password === hashed
        );

    if(user){

        if(
            document.getElementById("rememberMe").checked
        ){
            localStorage.setItem(
                "loggedInUser",
                username
            );
        }

        openDashboard(username);

    }else{

        showMsg(
            "Invalid Username or Password",
            "red"
        );
    }
}

// Dashboard
function openDashboard(username){

    document.getElementById(
        "registerSection"
    ).classList.add("hidden");

    document.getElementById(
        "loginSection"
    ).classList.add("hidden");

    document.getElementById(
        "dashboard"
    ).classList.remove("hidden");

    document.getElementById(
        "welcomeText"
    ).innerHTML =
        "Welcome, " + username + "!";
}

// Logout
function logout(){

    localStorage.removeItem(
        "loggedInUser"
    );

    location.reload();
}

// Message Helper
function showMsg(text,color){

    let msg =
        document.getElementById("message");

    msg.innerHTML = text;
    msg.style.color = color;
}

// Auto Login
window.onload = function(){

    let saved =
        localStorage.getItem("loggedInUser");

    if(saved){
        openDashboard(saved);
    }
};
</script>

</body>
</html>
