<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student App with API</title>

<style>
* {
    box-sizing: border-box;
}

body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin:0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container{
    max-width:620px;
    width: 100%;
    margin: 20px;
    background:white;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-height: 95vh;
    overflow-y: auto;
}

h2 {
    color: #333;
    margin-top: 0;
    border-bottom: 3px solid #667eea;
    padding-bottom: 10px;
}

input,button,select{
    width:100%;
    padding: 12px;
    margin: 6px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.3s;
}

input:focus, select:focus {
    border-color: #667eea;
    outline: none;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

button{
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color:white;
    border:none;
    cursor:pointer;
    font-weight: 600;
    padding: 12px;
    border-radius: 8px;
    transition: transform 0.2s;
}

button:hover{ 
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}

button:active {
    transform: translateY(0);
}

button.secondary {
    background: #6c757d;
}

button.secondary:hover {
    background: #5a6268;
}

button.danger {
    background: #dc3545;
}

button.danger:hover {
    background: #c82333;
}

button.success {
    background: #28a745;
}

button.success:hover {
    background: #218838;
}

button.warning {
    background: #ffc107;
    color: #333;
}

button.warning:hover {
    background: #e0a800;
}

button.info {
    background: #17a2b8;
}

button.info:hover {
    background: #138496;
}

.hidden{ display:none; }

.card{
    background: #f8f9fa;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    border-left: 4px solid #667eea;
    transition: all 0.3s;
}

.card:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card b {
    color: #333;
    font-size: 16px;
}

.card .small {
    color: #6c757d;
    font-size: 13px;
}

.nav {
    display: flex;
    gap: 10px;
    margin: 15px 0;
    flex-wrap: wrap;
}

.nav button {
    flex: 1;
    padding: 10px;
    min-width: 80px;
}

.btn-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.btn-group button {
    flex: 1;
    min-width: 70px;
}

.small-text {
    font-size: 14px;
    color: #6c757d;
}

#stats {
    background: #f1f3f5;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
}

#list {
    max-height: 400px;
    overflow-y: auto;
    margin-top: 10px;
}

.alert {
    padding: 12px;
    border-radius: 8px;
    margin: 10px 0;
}

.alert-error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}

.alert-success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

.alert-warning {
    background: #fff3cd;
    color: #856404;
    border: 1px solid #ffeeba;
}

.loading {
    text-align: center;
    padding: 20px;
    color: #667eea;
}

.spinner {
    border: 3px solid #f3f3f3;
    border-top: 3px solid #667eea;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: 10px auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Progress Bar Styles */
.progress-container {
    margin: 8px 0;
}

.progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #555;
    margin-bottom: 3px;
}

.progress-bar {
    width: 100%;
    height: 20px;
    background: #e9ecef;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
}

.progress-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.8s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: white;
}

.progress-fill.fees {
    background: linear-gradient(90deg, #28a745, #20c997);
}

.progress-fill.results {
    background: linear-gradient(90deg, #007bff, #6610f2);
}

.progress-fill.attendance {
    background: linear-gradient(90deg, #fd7e14, #ffc107);
}

/* Fee status badges */
.fee-status {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
}

.fee-paid {
    background: #d4edda;
    color: #155724;
}

.fee-pending {
    background: #f8d7da;
    color: #721c24;
}

.fee-partial {
    background: #fff3cd;
    color: #856404;
}

/* Student card with fees and results */
.student-details {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #e9ecef;
}

.student-details .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
}

.fees-section, .results-section {
    margin-top: 8px;
}

.fees-section h4, .results-section h4 {
    margin: 5px 0 8px 0;
    font-size: 14px;
    color: #495057;
}

/* Modal styles */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal-overlay.active {
    display: flex;
}

.modal {
    background: white;
    padding: 30px;
    border-radius: 16px;
    max-width: 400px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
}

.modal h3 {
    margin-top: 0;
    border-bottom: 2px solid #667eea;
    padding-bottom: 10px;
}

.modal-close {
    position: absolute;
    top: 10px;
    right: 15px;
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: #999;
}

.modal-close:hover {
    color: #333;
}

.modal .btn-group {
    margin-top: 15px;
}

/* Responsive */
@media (max-width: 480px) {
    .container {
        padding: 15px;
        margin: 10px;
    }
    .nav button {
        font-size: 12px;
        padding: 8px;
    }
    .btn-group button {
        font-size: 12px;
        padding: 8px;
    }
}
</style>
</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPage">
<h2>🔐 Login</h2>
<div id="loginAlert"></div>
<input id="loginEmail" placeholder="Email" type="email">
<input id="loginPass" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
<button id="goRegister" class="secondary">Create Account</button>
</div>

<!-- REGISTER -->
<div id="registerPage" class="hidden">
<h2>📝 Register</h2>
<div id="registerAlert"></div>
<input id="rUser" placeholder="Username">
<input id="rEmail" placeholder="Email" type="email">
<input id="rPass" type="password" placeholder="Password (min 6 characters)">
<input id="rConfirm" type="password" placeholder="Confirm Password">
<button id="regBtn" class="success">Register</button>
<button id="backLogin" class="secondary">Back to Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<h2>📊 Dashboard</h2>
<p id="welcome" style="font-size:18px; color:#333;"></p>
<div id="stats"></div>

<div class="nav">
<button id="goStudents">👨‍🎓 Students</button>
<button id="goFees">💰 Fees</button>
<button id="goResults">📊 Results</button>
<button id="goAPI">🌐 API</button>
</div>

<button id="logout" class="danger">🚪 Logout</button>
</div>

<!-- STUDENTS -->
<div id="studentsPage" class="hidden">
<h2>👨‍🎓 Students</h2>
<div id="studentAlert"></div>

<input id="sid" placeholder="ID" readonly style="background:#e9ecef;">
<input id="sname" placeholder="Name">
<input id="semail" placeholder="Email" type="email">
<input id="scourse" placeholder="Course">

<div class="btn-group">
<button id="saveStudent" class="success">💾 Save</button>
<button id="clearForm" class="secondary">🗑️ Clear</button>
</div>

<input id="search" placeholder="🔍 Search students...">

<div class="btn-group">
<button id="backDash1" class="secondary">⬅️ Back</button>
</div>

<div id="list"></div>
</div>

<!-- FEES PAGE -->
<div id="feesPage" class="hidden">
<h2>💰 Fees Management</h2>
<div id="feesAlert"></div>

<div id="feesList"></div>

<div class="btn-group" style="margin-top:15px;">
<button id="backDash3" class="secondary">⬅️ Back</button>
</div>
</div>

<!-- RESULTS PAGE -->
<div id="resultsPage" class="hidden">
<h2>📊 Results Management</h2>
<div id="resultsAlert"></div>

<div id="resultsList"></div>

<div class="btn-group" style="margin-top:15px;">
<button id="backDash4" class="secondary">⬅️ Back</button>
</div>
</div>

<!-- API -->
<div id="apiPage" class="hidden">
<h2>🌐 API Users</h2>
<button id="loadAPI">📥 Load Users</button>
<button id="backDash2" class="secondary">⬅️ Back</button>
<div id="apiList"></div>
</div>

</div>

<!-- Modal for Editing Fees -->
<div id="feeModal" class="modal-overlay">
    <div class="modal">
        <button class="modal-close" onclick="closeFeeModal()">&times;</button>
        <h3>💰 Update Fees</h3>
        <div id="feeModalAlert"></div>
        <input id="feeStudentName" readonly style="background:#e9ecef;">
        <label style="font-size:13px;color:#666;">Total Fee Amount</label>
        <input id="feeTotal" type="number" placeholder="Total Fee">
        <label style="font-size:13px;color:#666;">Amount Paid</label>
        <input id="feePaid" type="number" placeholder="Amount Paid">
        <label style="font-size:13px;color:#666;">Status</label>
        <select id="feeStatus">
            <option value="Paid">Paid</option>
            <option value="Pending">Pending</option>
            <option value="Partial">Partial</option>
        </select>
        <div class="btn-group">
            <button id="saveFee" class="success">💾 Save Fees</button>
            <button onclick="closeFeeModal()" class="secondary">Cancel</button>
        </div>
    </div>
</div>

<!-- Modal for Editing Results -->
<div id="resultModal" class="modal-overlay">
    <div class="modal">
        <button class="modal-close" onclick="closeResultModal()">&times;</button>
        <h3>📊 Update Results</h3>
        <div id="resultModalAlert"></div>
        <input id="resultStudentName" readonly style="background:#e9ecef;">
        <label style="font-size:13px;color:#666;">Subject</label>
        <input id="resultSubject" placeholder="Subject Name">
        <label style="font-size:13px;color:#666;">Score (%)</label>
        <input id="resultScore" type="number" placeholder="Score (0-100)" min="0" max="100">
        <label style="font-size:13px;color:#666;">Grade</label>
        <select id="resultGrade">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="F">F</option>
        </select>
        <div class="btn-group">
            <button id="saveResult" class="success">💾 Save Result</button>
            <button onclick="closeResultModal()" class="secondary">Cancel</button>
        </div>
    </div>
</div>

<script>
// =============================================
// API CONFIGURATION
// =============================================
const API_URL = 'http://localhost:5000/api';
let authToken = null;
let currentUser = null;

// =============================================
// API HELPERS
// =============================================
async function apiRequest(endpoint, options = {}) {
    const url = `${API_URL}${endpoint}`;
    const headers = {
        'Content-Type': 'application/json',
        ...options.headers
    };

    if (authToken) {
        headers['Authorization'] = `Bearer ${authToken}`;
    }

    const config = {
        ...options,
        headers
    };

    try {
        const response = await fetch(url, config);
        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || data.message || 'API request failed');
        }

        return data;
    } catch (error) {
        console.error('API Error:', error);
        throw error;
    }
}

// =============================================
// NAVIGATION
// =============================================
const pages = {
    login: loginPage,
    register: registerPage,
    dashboard: dashboard,
    students: studentsPage,
    fees: feesPage,
    results: resultsPage,
    api: apiPage
};

function showPage(page) {
    Object.values(pages).forEach(p => p.classList.add('hidden'));
    pages[page].classList.remove('hidden');
}

function showAlert(container, message, type = 'error') {
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type}`;
    alertDiv.textContent = message;
    container.innerHTML = '';
    container.appendChild(alertDiv);
    
    setTimeout(() => {
        if (alertDiv.parentNode) {
            alertDiv.remove();
        }
    }, 5000);
}

// =============================================
// AUTHENTICATION (same as before)
// =============================================

regBtn.onclick = async () => {
    const username = rUser.value.trim();
    const email = rEmail.value.trim();
    const password = rPass.value;
    const confirm = rConfirm.value;

    if (!username || !email || !password) {
        return showAlert(registerAlert, 'Please fill all fields', 'error');
    }

    if (password !== confirm) {
        return showAlert(registerAlert, 'Passwords do not match', 'error');
    }

    if (password.length < 6) {
        return showAlert(registerAlert, 'Password must be at least 6 characters', 'error');
    }

    try {
        regBtn.disabled = true;
        regBtn.textContent = 'Registering...';

        await apiRequest('/register', {
            method: 'POST',
            body: JSON.stringify({ username, email, password })
        });

        showAlert(registerAlert, 'Registration successful! Please login.', 'success');
        
        rUser.value = rEmail.value = rPass.value = rConfirm.value = '';
        
        setTimeout(() => {
            showPage('login');
        }, 1500);

    } catch (error) {
        showAlert(registerAlert, error.message, 'error');
    } finally {
        regBtn.disabled = false;
        regBtn.textContent = 'Register';
    }
};

loginBtn.onclick = async () => {
    const email = loginEmail.value.trim();
    const password = loginPass.value;

    if (!email || !password) {
        return showAlert(loginAlert, 'Please enter email and password', 'error');
    }

    try {
        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';

        const data = await apiRequest('/login', {
            method: 'POST',
            body: JSON.stringify({ email, password })
        });

        authToken = data.token;
        currentUser = data.user;
        
        localStorage.setItem('authToken', authToken);
        localStorage.setItem('user', JSON.stringify(currentUser));

        welcome.textContent = `Welcome, ${currentUser.username}! 👋`;
        await loadStats();
        showPage('dashboard');
        
        loginEmail.value = loginPass.value = '';
        loginAlert.innerHTML = '';

    } catch (error) {
        showAlert(loginAlert, error.message, 'error');
    } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
    }
};

logout.onclick = () => {
    authToken = null;
    currentUser = null;
    localStorage.removeItem('authToken');
    localStorage.removeItem('user');
    showPage('login');
    loginAlert.innerHTML = '';
};

function checkSession() {
    const savedToken = localStorage.getItem('authToken');
    const savedUser = localStorage.getItem('user');
    
    if (savedToken && savedUser) {
        authToken = savedToken;
        currentUser = JSON.parse(savedUser);
        welcome.textContent = `Welcome back, ${currentUser.username}! 👋`;
        loadStats();
        showPage('dashboard');
        return true;
    }
    return false;
}

// =============================================
// STUDENT CRUD OPERATIONS
// =============================================

let editId = null;

async function loadStudents() {
    try {
        const data = await apiRequest('/students');
        return data;
    } catch (error) {
        console.error('Error loading students:', error);
        return [];
    }
}

async function renderStudents() {
    const searchQuery = search.value.trim();
    let students = [];

    try {
        if (searchQuery) {
            students = await apiRequest(`/students/search/${encodeURIComponent(searchQuery)}`);
        } else {
            students = await loadStudents();
        }

        const list = document.getElementById('list');
        
        if (students.length === 0) {
            list.innerHTML = `<div class="card" style="text-align:center; color:#6c757d;">
                No students found. Add your first student!
            </div>`;
            return;
        }

        list.innerHTML = students.map(s => {
            // Generate random fees and results data for demo
            const fees = s.fees || { total: 10000, paid: Math.floor(Math.random() * 10000), status: ['Paid', 'Pending', 'Partial'][Math.floor(Math.random() * 3)] };
            const result = s.result || { subject: 'Mathematics', score: Math.floor(Math.random() * 100), grade: ['A', 'B', 'C', 'D', 'F'][Math.floor(Math.random() * 5)] };
            const attendance = s.attendance || Math.floor(Math.random() * 100);
            
            const feePercent = fees.total > 0 ? Math.min((fees.paid / fees.total) * 100, 100) : 0;
            const statusClass = fees.status === 'Paid' ? 'fee-paid' : fees.status === 'Partial' ? 'fee-partial' : 'fee-pending';

            return `
            <div class="card">
                <b>${s.name}</b>
                <div class="small">${s.email}</div>
                <div class="small">📚 ${s.course || 'No course'}</div>
                <div class="small" style="font-size:11px; color:#adb5bd;">ID: ${s.id}</div>
                
                <div class="student-details">
                    <div class="fees-section">
                        <h4>💰 Fees</h4>
                        <div class="progress-container">
                            <div class="progress-label">
                                <span>${fees.status}</span>
                                <span>${fees.paid.toLocaleString()} / ${fees.total.toLocaleString()}</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill fees" style="width:${feePercent}%;">
                                    ${feePercent.toFixed(0)}%
                                </div>
                            </div>
                        </div>
                        <span class="fee-status ${statusClass}">${fees.status}</span>
                    </div>
                    
                    <div class="results-section">
                        <h4>📊 Results</h4>
                        <div class="progress-container">
                            <div class="progress-label">
                                <span>${result.subject}</span>
                                <span>${result.score}% - Grade ${result.grade}</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill results" style="width:${Math.min(result.score, 100)}%;">
                                    ${result.score}%
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="progress-container">
                        <div class="progress-label">
                            <span>📋 Attendance</span>
                            <span>${attendance}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill attendance" style="width:${attendance}%;">
                                ${attendance}%
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="btn-group" style="margin-top:10px;">
                    <button class="secondary" onclick="editStudent(${s.id})">✏️ Edit</button>
                    <button class="danger" onclick="deleteStudent(${s.id})">🗑️ Delete</button>
                    <button class="info" onclick="editFees(${s.id})">💰 Fees</button>
                    <button class="warning" onclick="editResult(${s.id})">📊 Result</button>
                </div>
            </div>
        `}).join('');

    } catch (error) {
        document.getElementById('list').innerHTML = 
            `<div class="alert alert-error">Error loading students: ${error.message}</div>`;
    }
}

saveStudent.onclick = async () => {
    const name = sname.value.trim();
    const email = semail.value.trim();
    const course = scourse.value.trim();

    if (!name || !email) {
        return showAlert(studentAlert, 'Name and Email are required', 'error');
    }

    try {
        saveStudent.disabled = true;
        saveStudent.textContent = 'Saving...';

        if (editId) {
            await apiRequest(`/students/${editId}`, {
                method: 'PUT',
                body: JSON.stringify({ name, email, course })
            });
            showAlert(studentAlert, 'Student updated successfully!', 'success');
        } else {
            const newStudent = await apiRequest('/students', {
                method: 'POST',
                body: JSON.stringify({ name, email, course })
            });
            // Initialize fees and results for new student
            if (newStudent && newStudent.id) {
                await apiRequest(`/students/${newStudent.id}/fees`, {
                    method: 'PUT',
                    body: JSON.stringify({ total: 10000, paid: 0, status: 'Pending' })
                });
                await apiRequest(`/students/${newStudent.id}/result`, {
                    method: 'PUT',
                    body: JSON.stringify({ subject: 'Not Set', score: 0, grade: 'F' })
                });
            }
            showAlert(studentAlert, 'Student added successfully!', 'success');
        }

        clearForm();
        await renderStudents();
        await loadStats();

    } catch (error) {
        showAlert(studentAlert, error.message, 'error');
    } finally {
        saveStudent.disabled = false;
        saveStudent.textContent = '💾 Save';
    }
};

async function editStudent(id) {
    try {
        const students = await loadStudents();
        const student = students.find(s => s.id === id);
        
        if (!student) {
            throw new Error('Student not found');
        }

        sid.value = student.id;
        sname.value = student.name;
        semail.value = student.email;
        scourse.value = student.course || '';
        editId = student.id;
        
        document.getElementById('studentsPage').scrollTop = 0;
        
    } catch (error) {
        showAlert(studentAlert, error.message, 'error');
    }
}

async function deleteStudent(id) {
    if (!confirm('Are you sure you want to delete this student?')) return;

    try {
        await apiRequest(`/students/${id}`, {
            method: 'DELETE'
        });
        
        await renderStudents();
        await loadStats();
        showAlert(studentAlert, 'Student deleted successfully!', 'success');
        
    } catch (error) {
        showAlert(studentAlert, error.message, 'error');
    }
}

clearForm.onclick = () => {
    clearForm();
};

function clearForm() {
    sid.value = '';
    sname.value = '';
    semail.value = '';
    scourse.value = '';
    editId = null;
    studentAlert.innerHTML = '';
}

search.oninput = () => {
    renderStudents();
};

// =============================================
// FEES MANAGEMENT
// =============================================

let currentFeeStudentId = null;

async function renderFees() {
    try {
        const students = await loadStudents();
        const list = document.getElementById('feesList');
        
        if (students.length === 0) {
            list.innerHTML = `<div class="card" style="text-align:center; color:#6c757d;">
                No students to manage fees.
            </div>`;
            return;
        }

        list.innerHTML = students.map(s => {
            const fees = s.fees || { total: 10000, paid: 0, status: 'Pending' };
            const feePercent = fees.total > 0 ? Math.min((fees.paid / fees.total) * 100, 100) : 0;
            const statusClass = fees.status === 'Paid' ? 'fee-paid' : fees.status === 'Partial' ? 'fee-partial' : 'fee-pending';
            
            return `
            <div class="card">
                <b>${s.name}</b>
                <div class="small">${s.email}</div>
                <div class="fees-section">
                    <div class="progress-container">
                        <div class="progress-label">
                            <span>${fees.status}</span>
                            <span>${fees.paid.toLocaleString()} / ${fees.total.toLocaleString()}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill fees" style="width:${feePercent}%;">
                                ${feePercent.toFixed(0)}%
                            </div>
                        </div>
                    </div>
                    <span class="fee-status ${statusClass}">${fees.status}</span>
                </div>
                <div class="btn-group" style="margin-top:10px;">
                    <button class="info" onclick="editFees(${s.id})">✏️ Edit Fees</button>
                </div>
            </div>
        `}).join('');

    } catch (error) {
        document.getElementById('feesList').innerHTML = 
            `<div class="alert alert-error">Error loading fees: ${error.message}</div>`;
    }
}

async function editFees(studentId) {
    try {
        const students = await loadStudents();
        const student = students.find(s => s.id === studentId);
        
        if (!student) {
            throw new Error('Student not found');
        }
        
        currentFeeStudentId = studentId;
        feeStudentName.value = student.name;
        
        const fees = student.fees || { total: 10000, paid: 0, status: 'Pending' };
        feeTotal.value = fees.total || 10000;
        feePaid.value = fees.paid || 0;
        feeStatus.value = fees.status || 'Pending';
        
        document.getElementById('feeModal').classList.add('active');
        feeModalAlert.innerHTML = '';
        
    } catch (error) {
        showAlert(feesAlert, error.message, 'error');
    }
}

saveFee.onclick = async () => {
    const total = parseFloat(feeTotal.value);
    const paid = parseFloat(feePaid.value);
    const status = feeStatus.value;

    if (isNaN(total) || total <= 0) {
        return showAlert(feeModalAlert, 'Please enter a valid total amount', 'error');
    }
    if (isNaN(paid) || paid < 0) {
        return showAlert(feeModalAlert, 'Please enter a valid paid amount', 'error');
    }

    try {
        saveFee.disabled = true;
        saveFee.textContent = 'Saving...';

        await apiRequest(`/students/${currentFeeStudentId}/fees`, {
            method: 'PUT',
            body: JSON.stringify({ total, paid, status })
        });

        showAlert(feeModalAlert, 'Fees updated successfully!', 'success');
        
        setTimeout(() => {
            closeFeeModal();
            renderFees();
            renderStudents();
            loadStats();
        }, 1000);

    } catch (error) {
        showAlert(feeModalAlert, error.message, 'error');
    } finally {
        saveFee.disabled = false;
        saveFee.textContent = '💾 Save Fees';
    }
};

function closeFeeModal() {
    document.getElementById('feeModal').classList.remove('active');
    currentFeeStudentId = null;
    feeModalAlert.innerHTML = '';
}

// =============================================
// RESULTS MANAGEMENT
// =============================================

let currentResultStudentId = null;

async function renderResults() {
    try {
        const students = await loadStudents();
        const list = document.getElementById('resultsList');
        
        if (students.length === 0) {
            list.innerHTML = `<div class="card" style="text-align:center; color:#6c757d;">
                No students to manage results.
            </div>`;
            return;
        }

        list.innerHTML = students.map(s => {
            const result = s.result || { subject: 'Not Set', score: 0, grade: 'F' };
            
            return `
            <div class="card">
                <b>${s.name}</b>
                <div class="small">${s.email}</div>
                <div class="results-section">
                    <div class="progress-container">
                        <div class="progress-label">
                            <span>${result.subject}</span>
                            <span>${result.score}% - Grade ${result.grade}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill results" style="width:${Math.min(result.score, 100)}%;">
                                ${result.score}%
                            </div>
                        </div>
                    </div>
                </div>
                <div class="btn-group" style="margin-top:10px;">
                    <button class="warning" onclick="editResult(${s.id})">✏️ Edit Result</button>
                </div>
            </div>
        `}).join('');

    } catch (error) {
        document.getElementById('resultsList').innerHTML = 
            `<div class="alert alert-error">Error loading results: ${error.message}</div>`;
    }
}

async function editResult(studentId) {
    try {
        const students = await loadStudents();
        const student = students.find(s => s.id === studentId);
        
        if (!student) {
            throw new Error('Student not found');
        }
        
        currentResultStudentId = studentId;
        resultStudentName.value = student.name;
        
        const result = student.result || { subject: 'Not Set', score: 0, grade: 'F' };
        resultSubject.value = result.subject || '';
        resultScore.value = result.score || 0;
        resultGrade.value = result.grade || 'F';
        
        document.getElementById('resultModal').classList.add('active');
        resultModalAlert.innerHTML = '';
        
    } catch (error) {
        showAlert(resultsAlert, error.message, 'error');
    }
}

saveResult.onclick = async () => {
    const subject = resultSubject.value.trim();
    const score = parseFloat(resultScore.value);
    const grade = resultGrade.value;

    if (!subject) {
        return showAlert(resultModalAlert, 'Please enter a subject name', 'error');
    }
    if (isNaN(score) || score < 0 || score > 100) {
        return showAlert(resultModalAlert, 'Please enter a valid score (0-100)', 'error');
    }

    try {
        saveResult.disabled = true;
        saveResult.textContent = 'Saving...';

        await apiRequest(`/students/${currentResultStudentId}/result`, {
            method: 'PUT',
            body: JSON.stringify({ subject, score, grade })
        });

        showAlert(resultModalAlert, 'Result updated successfully!', 'success');
        
        setTimeout(() => {
            closeResultModal();
            renderResults();
            renderStudents();
        }, 1000);

    } catch (error) {
        showAlert(resultModalAlert, error.message, 'error');
    } finally {
        saveResult.disabled = false;
        saveResult.textContent = '💾 Save Result';
    }
};

function closeResultModal() {
    document.getElementById('resultModal').classList.remove('active');
    currentResultStudentId = null;
    resultModalAlert.innerHTML = '';
}

// =============================================
// STATS
// =============================================

async function loadStats() {
    try {
        const students = await loadStudents();
        const total = students.length;
        const paidCount = students.filter(s => s.fees && s.fees.status === 'Paid').length;
        const avgScore = students.length > 0 ? 
            Math.round(students.reduce((sum, s) => sum + (s.result?.score || 0), 0) / students.length) : 0;
        
        document.getElementById('stats').innerHTML = `
            👨‍🎓 Total Students: <strong>${total}</strong> &nbsp;|&nbsp;
            ✅ Fees Paid: <strong>${paidCount}</strong> &nbsp;|&nbsp;
            📊 Avg Score: <strong>${avgScore}%</strong>
        `;
        return { total, paidCount, avgScore };
    } catch (error) {
        document.getElementById('stats').innerHTML = 'Error loading stats';
        return null;
    }
}

// =============================================
// API FETCH
// =============================================

loadAPI.onclick = async () => {
    try {
        loadAPI.disabled = true;
        loadAPI.textContent = 'Loading...';
        apiList.innerHTML = '<div class="loading"><div class="spinner"></div><p>Fetching users...</p></div>';

        const response = await fetch('https://jsonplaceholder.typicode.com/users');
        const data = await response.json();

        apiList.innerHTML = data.map(u => `
            <div class="card">
                <b>${u.name}</b>
                <div class="small">${u.email}</div>
                <div class="small">🏢 ${u.company?.name || 'N/A'}</div>
                <div class="small">🌐 ${u.website || 'N/A'}</div>
            </div>
        `).join('');

    } catch (error) {
        apiList.innerHTML = `<div class="alert alert-error">Error: ${error.message}</div>`;
    } finally {
        loadAPI.disabled = false;
        loadAPI.textContent = '📥 Load Users';
    }
};
