<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student App with API</title>

<style>
* {
    box-sizing: border-box;
}

body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin:0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container{
    max-width:540px;
    width: 100%;
    margin: 20px;
    background:white;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-height: 95vh;
    overflow-y: auto;
}

h2 {
    color: #333;
    margin-top: 0;
    border-bottom: 3px solid #667eea;
    padding-bottom: 10px;
}

input,button{
    width:100%;
    padding: 12px;
    margin: 6px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.3s;
}

input:focus {
    border-color: #667eea;
    outline: none;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

button{
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color:white;
    border:none;
    cursor:pointer;
    font-weight: 600;
    padding: 12px;
    border-radius: 8px;
    transition: transform 0.2s;
}

button:hover{ 
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}

button:active {
    transform: translateY(0);
}

button.secondary {
    background: #6c757d;
}

button.secondary:hover {
    background: #5a6268;
}

button.danger {
    background: #dc3545;
}

button.danger:hover {
    background: #c82333;
}

button.success {
    background: #28a745;
}

button.success:hover {
    background: #218838;
}

.hidden{ display:none; }

.card{
    background: #f8f9fa;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    border-left: 4px solid #667eea;
    transition: all 0.3s;
}

.card:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card b {
    color: #333;
    font-size: 16px;
}

.card .small {
    color: #6c757d;
    font-size: 13px;
}

.nav {
    display: flex;
    gap: 10px;
    margin: 15px 0;
}

.nav button {
    flex: 1;
    padding: 10px;
}

.btn-group {
    display: flex;
    gap: 8px;
}

.btn-group button {
    flex: 1;
}

.small-text {
    font-size: 14px;
    color: #6c757d;
}

#stats {
    background: #f1f3f5;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
}

#list {
    max-height: 400px;
    overflow-y: auto;
    margin-top: 10px;
}

.alert {
    padding: 12px;
    border-radius: 8px;
    margin: 10px 0;
}

.alert-error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}

.alert-success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

.loading {
    text-align: center;
    padding: 20px;
    color: #667eea;
}

.spinner {
    border: 3px solid #f3f3f3;
    border-top: 3px solid #667eea;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: 10px auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPage">
<h2>🔐 Login</h2>
<div id="loginAlert"></div>
<input id="loginEmail" placeholder="Email" type="email">
<input id="loginPass" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
<button id="goRegister" class="secondary">Create Account</button>
</div>

<!-- REGISTER -->
<div id="registerPage" class="hidden">
<h2>📝 Register</h2>
<div id="registerAlert"></div>
<input id="rUser" placeholder="Username">
<input id="rEmail" placeholder="Email" type="email">
<input id="rPass" type="password" placeholder="Password (min 6 characters)">
<input id="rConfirm" type="password" placeholder="Confirm Password">
<button id="regBtn" class="success">Register</button>
<button id="backLogin" class="secondary">Back to Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<h2>📊 Dashboard</h2>
<p id="welcome" style="font-size:18px; color:#333;"></p>
<div id="stats"></div>

<div class="nav">
<button id="goStudents">👨‍🎓 Students</button>
<button id="goAPI">🌐 API</button>
</div>

<button id="logout" class="danger">🚪 Logout</button>
</div>

<!-- STUDENTS -->
<div id="studentsPage" class="hidden">
<h2>👨‍🎓 Students</h2>
<div id="studentAlert"></div>

<input id="sid" placeholder="ID" readonly style="background:#e9ecef;">
<input id="sname" placeholder="Name">
<input id="semail" placeholder="Email" type="email">
<input id="scourse" placeholder="Course">

<div class="btn-group">
<button id="saveStudent" class="success">💾 Save</button>
<button id="clearForm" class="secondary">🗑️ Clear</button>
</div>

<input id="search" placeholder="🔍 Search students...">

<div class="btn-group">
<button id="backDash1" class="secondary">⬅️ Back</button>
</div>

<div id="list"></div>
</div>

<!-- API -->
<div id="apiPage" class="hidden">
<h2>🌐 API Users</h2>
<button id="loadAPI">📥 Load Users</button>
<button id="backDash2" class="secondary">⬅️ Back</button>
<div id="apiList"></div>
</div>

</div>

<script>
// =============================================
// API CONFIGURATION
// =============================================
const API_URL = 'http://localhost:5000/api';
let authToken = null;
let currentUser = null;

// =============================================
// API HELPERS
// =============================================
async function apiRequest(endpoint, options = {}) {
    const url = `${API_URL}${endpoint}`;
    const headers = {
        'Content-Type': 'application/json',
        ...options.headers
    };

    if (authToken) {
        headers['Authorization'] = `Bearer ${authToken}`;
    }

    const config = {
        ...options,
        headers
    };

    try {
        const response = await fetch(url, config);
        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || data.message || 'API request failed');
        }

        return data;
    } catch (error) {
        console.error('API Error:', error);
        throw error;
    }
}

// =============================================
// NAVIGATION
// =============================================
const pages = {
    login: loginPage,
    register: registerPage,
    dashboard: dashboard,
    students: studentsPage,
    api: apiPage
};

function showPage(page) {
    Object.values(pages).forEach(p => p.classList.add('hidden'));
    pages[page].classList.remove('hidden');
}

function showAlert(container, message, type = 'error') {
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type}`;
    alertDiv.textContent = message;
    container.innerHTML = '';
    container.appendChild(alertDiv);
    
    // Auto dismiss after 5 seconds
    setTimeout(() => {
        if (alertDiv.parentNode) {
            alertDiv.remove();
        }
    }, 5000);
}

// =============================================
// AUTHENTICATION
// =============================================

// Register
regBtn.onclick = async () => {
    const username = rUser.value.trim();
    const email = rEmail.value.trim();
    const password = rPass.value;
    const confirm = rConfirm.value;

    if (!username || !email || !password) {
        return showAlert(registerAlert, 'Please fill all fields', 'error');
    }

    if (password !== confirm) {
        return showAlert(registerAlert, 'Passwords do not match', 'error');
    }

    if (password.length < 6) {
        return showAlert(registerAlert, 'Password must be at least 6 characters', 'error');
    }

    try {
        regBtn.disabled = true;
        regBtn.textContent = 'Registering...';

        await apiRequest('/register', {
            method: 'POST',
            body: JSON.stringify({ username, email, password })
        });

        showAlert(registerAlert, 'Registration successful! Please login.', 'success');
        
        // Clear form
        rUser.value = rEmail.value = rPass.value = rConfirm.value = '';
        
        // Switch to login after delay
        setTimeout(() => {
            showPage('login');
        }, 1500);

    } catch (error) {
        showAlert(registerAlert, error.message, 'error');
    } finally {
        regBtn.disabled = false;
        regBtn.textContent = 'Register';
    }
};

// Login
loginBtn.onclick = async () => {
    const email = loginEmail.value.trim();
    const password = loginPass.value;

    if (!email || !password) {
        return showAlert(loginAlert, 'Please enter email and password', 'error');
    }

    try {
        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';

        const data = await apiRequest('/login', {
            method: 'POST',
            body: JSON.stringify({ email, password })
        });

        authToken = data.token;
        currentUser = data.user;
        
        // Store token in localStorage for persistence
        localStorage.setItem('authToken', authToken);
        localStorage.setItem('user', JSON.stringify(currentUser));

        // Show dashboard
        welcome.textContent = `Welcome, ${currentUser.username}! 👋`;
        await loadStats();
        showPage('dashboard');
        
        loginEmail.value = loginPass.value = '';
        loginAlert.innerHTML = '';

    } catch (error) {
        showAlert(loginAlert, error.message, 'error');
    } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
    }
};

// Logout
logout.onclick = () => {
    authToken = null;
    currentUser = null;
    localStorage.removeItem('authToken');
    localStorage.removeItem('user');
    showPage('login');
    loginAlert.innerHTML = '';
};

// Check saved session
function checkSession() {
    const savedToken = localStorage.getItem('authToken');
    const savedUser = localStorage.getItem('user');
    
    if (savedToken && savedUser) {
        authToken = savedToken;
        currentUser = JSON.parse(savedUser);
        welcome.textContent = `Welcome back, ${currentUser.username}! 👋`;
        loadStats();
        showPage('dashboard');
        return true;
    }
    return false;
}

// =============================================
// STUDENT CRUD OPERATIONS
// =============================================

let editId = null;

async function loadStudents() {
    try {
        const data = await apiRequest('/students');
        return data;
    } catch (error) {
        console.error('Error loading students:', error);
        return [];
    }
}

async function renderStudents() {
    const searchQuery = search.value.trim();
    let students = [];

    try {
        if (searchQuery) {
            students = await apiRequest(`/students/search/${encodeURIComponent(searchQuery)}`);
        } else {
            students = await loadStudents();
        }

        const list = document.getElementById('list');
        
        if (students.length === 0) {
            list.innerHTML = `<div class="card" style="text-align:center; color:#6c757d;">
                No students found. Add your first student!
            </div>`;
            return;
        }

        list.innerHTML = students.map(s => `
            <div class="card">
                <b>${s.name}</b>
                <div class="small">${s.email}</div>
                <div class="small">📚 ${s.course || 'No course'}</div>
                <div class="small" style="font-size:11px; color:#adb5bd;">ID: ${s.id}</div>
                <div class="btn-group" style="margin-top:10px;">
                    <button class="secondary" onclick="editStudent(${s.id})">✏️ Edit</button>
                    <button class="danger" onclick="deleteStudent(${s.id})">🗑️ Delete</button>
                </div>
            </div>
        `).join('');

    } catch (error) {
        document.getElementById('list').innerHTML = 
            `<div class="alert alert-error">Error loading students: ${error.message}</div>`;
    }
}

// Save student
saveStudent.onclick = async () => {
    const name = sname.value.trim();
    const email = semail.value.trim();
    const course = scourse.value.trim();

    if (!name || !email) {
        return showAlert(studentAlert, 'Name and Email are required', 'error');
    }

    try {
        saveStudent.disabled = true;
        saveStudent.textContent = 'Saving...';

        if (editId) {
            // Update
            await apiRequest(`/students/${editId}`, {
                method: 'PUT',
                body: JSON.stringify({ name, email, course })
            });
            showAlert(studentAlert, 'Student updated successfully!', 'success');
        } else {
            // Create
            await apiRequest('/students', {
                method: 'POST',
                body: JSON.stringify({ name, email, course })
            });
            showAlert(studentAlert, 'Student added successfully!', 'success');
        }

        clearForm();
        await renderStudents();
        await loadStats();

    } catch (error) {
        showAlert(studentAlert, error.message, 'error');
    } finally {
        saveStudent.disabled = false;
        saveStudent.textContent = '💾 Save';
    }
};

// Edit student
async function editStudent(id) {
    try {
        const students = await loadStudents();
        const student = students.find(s => s.id === id);
        
        if (!student) {
            throw new Error('Student not found');
        }

        sid.value = student.id;
        sname.value = student.name;
        semail.value = student.email;
        scourse.value = student.course || '';
        editId = student.id;
        
        // Scroll to form
        document.getElementById('studentsPage').scrollTop = 0;
        
    } catch (error) {
        showAlert(studentAlert, error.message, 'error');
    }
}

// Delete student
async function deleteStudent(id) {
    if (!confirm('Are you sure you want to delete this student?')) return;

    try {
        await apiRequest(`/students/${id}`, {
            method: 'DELETE'
        });
        
        await renderStudents();
        await loadStats();
        showAlert(studentAlert, 'Student deleted successfully!', 'success');
        
    } catch (error) {
        showAlert(studentAlert, error.message, 'error');
    }
}

// Clear form
clearForm.onclick = () => {
    clearForm();
};

function clearForm() {
    sid.value = '';
    sname.value = '';
    semail.value = '';
    scourse.value = '';
    editId = null;
    studentAlert.innerHTML = '';
}

// Search
search.oninput = () => {
    renderStudents();
};

// =============================================
// STATS
// =============================================

async function loadStats() {
    try {
        const data = await apiRequest('/stats');
        document.getElementById('stats').innerHTML = `
            👨‍🎓 Total Students: <strong>${data.totalStudents}</strong>
        `;
        return data;
    } catch (error) {
        document.getElementById('stats').innerHTML = 'Error loading stats';
        return null;
    }
}

// =============================================
// API FETCH
// =============================================

loadAPI.onclick = async () => {
    try {
        loadAPI.disabled = true;
        loadAPI.textContent = 'Loading...';
        apiList.innerHTML = '<div class="loading"><div class="spinner"></div><p>Fetching users...</p></div>';

        const response = await fetch('https://jsonplaceholder.typicode.com/users');
        const data = await response.json();

        apiList.innerHTML = data.map(u => `
            <div class="card">
                <b>${u.name}</b>
                <div class="small">${u.email}</div>
                <div class="small">🏢 ${u.company?.name || 'N/A'}</div>
                <div class="small">🌐 ${u.website || 'N/A'}</div>
            </div>
        `).join('');

    } catch (error) {
        apiList.innerHTML = `<div class="alert alert-error">Error: ${error.message}</div>`;
    } finally {
        loadAPI.disabled = false;
        loadAPI.textContent = '📥 Load Users';
    }
};

// =============================================
// NAVIGATION EVENTS
// =============================================

goRegister.onclick = () => {
    showPage('register');
    registerAlert.innerHTML = '';
};

backLogin.onclick = () => {
    showPage('login');
    loginAlert.innerHTML = '';
};

goStudents.onclick = () => {
    showPage('students');
    renderStudents();
    studentAlert.innerHTML = '';
};

goAPI.onclick = () => {
    showPage('api');
    apiList.innerHTML = 'Click "Load Users" to fetch data';
};

backDash1.onclick = () => showPage('dashboard');
backDash2.onclick = () => showPage('dashboard');

// =============================================
// INITIALIZATION
// =============================================

// Check for saved session
if (!checkSession()) {
    showPage('login');
}

// Enter key support
document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        if (!loginPage.classList.contains('hidden')) {
            loginBtn.click();
        } else if (!registerPage.classList.contains('hidden')) {
            regBtn.click();
        }
    }
});

console.log('🚀 Student App with API ready!');
console.log('📡 API URL:', API_URL);
</script>

</body>
</html>
